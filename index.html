<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CashBash 🧾 — Till Roll Calculator</title>
  <meta name="description" content="Bash in the cash. A simple till roll calculator for counting up your takings and working out what to bank.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Share Tech Mono", "Courier New", monospace;
      background: #d6d0c4;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 24px, rgba(0,0,0,0.03) 24px, rgba(0,0,0,0.03) 25px),
        repeating-linear-gradient(90deg, transparent, transparent 24px, rgba(0,0,0,0.02) 24px, rgba(0,0,0,0.02) 25px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 80px;
    }

    /* Till roll wrapper */
    #roll {
      width: 100%;
      max-width: 360px;
      position: relative;
      filter: drop-shadow(0 4px 18px rgba(0,0,0,0.22));
    }

    /* Wavy edge via SVG */
    .roll-edge {
      display: block;
      width: 100%;
      height: 18px;
    }

    #roll-body {
      background: #fffef9;
      padding: 8px 28px 12px;
      /* Subtle vertical lines like thermal paper */
      background-image: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.012) 3px,
        rgba(0,0,0,0.012) 4px
      );
    }

    /* Branding */
    #branding {
      text-align: center;
      padding: 12px 0 10px;
    }

    #branding h1 {
      font-family: "Pacifico", cursive;
      font-size: 30px;
      color: #1a1a1a;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    #branding p {
      font-size: 10px;
      color: #888;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .receipt-divider {
      border: none;
      border-top: 1px dashed #bbb;
      margin: 8px 0;
    }

    .receipt-divider.double {
      border-top: 1px solid #999;
      margin-bottom: 1px;
    }
    .receipt-divider.double + .receipt-divider.double {
      margin-top: 0;
      margin-bottom: 8px;
      border-top: 1px solid #999;
    }

    /* Numbers list */
    #numbers {
      display: flex;
      flex-direction: column;
    }

    .number-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 2px 0;
      position: relative;
    }

    .number-row .delete-btn {
      position: absolute;
      right: -13px;
      opacity: 0;
      cursor: pointer;
      font-size: 20px;
      color: #cc3333;
      transition: opacity 0.15s;
      user-select: none;
      line-height: 1;
    }

    .number-row:hover .delete-btn {
      opacity: 1;
    }

    .row-input {
      background: transparent;
      border: none;
      outline: none;
      color: #1a1a1a;
      font-size: 18px;
      font-family: inherit;
      text-align: right;
      width: 100%;
      caret-color: #1a1a1a;
      cursor: default;
    }

    .row-input:focus {
      color: #1a6b3a;
      cursor: text;
    }

    /* Entry row */
    .input-row {
      display: flex;
      justify-content: flex-end;
      padding: 2px 0;
    }

    #entry {
      background: transparent;
      border: none;
      outline: none;
      color: #1a6b3a;
      font-size: 18px;
      font-family: inherit;
      text-align: right;
      width: 100%;
      caret-color: #1a6b3a;
    }

    #entry::placeholder {
      color: #ccc;
      font-size: 13px;
    }

    /* Total row */
    #total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 4px 0 2px;
    }

    #total-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #total {
      font-size: 22px;
      font-weight: 600;
      color: #1a55a0;
    }

    /* Deductions */
    #deductions {
      display: flex;
      flex-direction: column;
    }

    .deduction-row {
      display: flex;
      align-items: center;
      padding: 2px 0;
      gap: 6px;
      position: relative;
    }

    .deduction-row .delete-btn {
      position: absolute;
      right: -13px;
      opacity: 0;
      cursor: pointer;
      font-size: 20px;
      color: #cc3333;
      transition: opacity 0.15s;
      user-select: none;
      line-height: 1;
    }

    .deduction-row:hover .delete-btn {
      opacity: 1;
    }

    .deduction-label {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #999;
      font-size: 11px;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: default;
      min-width: 0;
    }

    .deduction-label:focus {
      color: #1a1a1a;
      cursor: text;
    }

    .deduction-amount {
      background: transparent;
      border: none;
      outline: none;
      color: #b03030;
      font-size: 18px;
      font-family: inherit;
      text-align: right;
      width: 120px;
      caret-color: #b03030;
      cursor: default;
    }

    .deduction-amount:focus {
      cursor: text;
    }

    #add-deduction {
      font-size: 11px;
      color: #ccc;
      cursor: pointer;
      padding: 3px 0;
      user-select: none;
      letter-spacing: 0.05em;
      transition: color 0.15s;
      width: fit-content;
    }

    #add-deduction:hover {
      color: #999;
    }

    /* Grand total */
    #grand-total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 0 4px;
    }

    #grand-total-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #grand-total {
      font-size: 28px;
      font-weight: 700;
      color: #1a6b3a;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    #grand-total:hover {
      opacity: 0.75;
    }

    #copy-confirm {
      position: absolute;
      right: 0;
      top: -32px;
      font-size: 11px;
      color: #fff;
      background: #1a6b3a;
      padding: 3px 8px;
      border-radius: 5px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    #copy-confirm::after {
      content: '';
      position: absolute;
      bottom: -4px;
      right: 10px;
      border-width: 4px 4px 0;
      border-style: solid;
      border-color: #1a6b3a transparent transparent;
    }

    #copy-confirm.show {
      opacity: 1;
      transform: translateY(0);
    }

    #grand-total.negative {
      color: #cc3333;
    }

    @keyframes copy-flash {
      0%   { transform: scale(1); opacity: 1; }
      30%  { transform: scale(1.08); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    #grand-total.copied {
      animation: copy-flash 0.35s ease-out;
    }

    /* Footer on the roll */
    #roll-footer {
      text-align: center;
      padding: 10px 0 6px;
      margin-top: 16px;
      font-size: 10px;
      color: #ccc;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #contact {
      color: #ccc;
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.06em;
    }

    #clear-btn {
      display: block;
      margin: 6px auto 0;
      background: none;
      border: 1px dashed #ddd;
      color: #bbb;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #clear-btn:hover {
      color: #cc3333;
      border-color: #cc3333;
    }

    #contact:hover {
      color: #999;
    }

    .hint {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.04em;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
</head>
<body>

  <div id="roll">
    <!-- Wavy top edge -->
    <svg class="roll-edge" viewBox="0 0 360 18" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,18 Q9,4 18,18 Q27,4 36,18 Q45,4 54,18 Q63,4 72,18 Q81,4 90,18 Q99,4 108,18 Q117,4 126,18 Q135,4 144,18 Q153,4 162,18 Q171,4 180,18 Q189,4 198,18 Q207,4 216,18 Q225,4 234,18 Q243,4 252,18 Q261,4 270,18 Q279,4 288,18 Q297,4 306,18 Q315,4 324,18 Q333,4 342,18 Q351,4 360,18 L360,18 L0,18 Z" fill="#fffef9"/>
    </svg>

    <div id="roll-body">
      <div id="branding">
        <h1>CashBash</h1>
        <p>Bash in the cash &amp; get yourself to the bank</p>
      </div>

      <hr class="receipt-divider">

      <div id="numbers"></div>
      <div class="input-row">
        <input id="entry" type="text" placeholder="type a number, hit enter" autocomplete="off" autofocus>
      </div>

      <hr class="receipt-divider">

      <div id="total-row">
        <span id="total-label">Total</span>
        <span id="total">0.00</span>
      </div>

      <div id="deductions"></div>
      <div id="add-deduction">+ add deduction</div>

      <hr class="receipt-divider double">
      <hr class="receipt-divider double">

      <div id="grand-total-row">
        <span id="grand-total-label">To Be Banked</span>
        <span id="grand-total">0.00<span id="copy-confirm">copied!</span></span>
      </div>

      <div id="roll-footer">* * * thank you * * *<br><a href="mailto:stuart@northcolour.com" id="contact">stuart@northcolour.com</a></div>
      <button id="clear-btn">clear</button>
    </div>

    <!-- Wavy bottom edge -->
    <svg class="roll-edge" viewBox="0 0 360 18" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,0 Q9,14 18,0 Q27,14 36,0 Q45,14 54,0 Q63,14 72,0 Q81,14 90,0 Q99,14 108,0 Q117,14 126,0 Q135,14 144,0 Q153,14 162,0 Q171,14 180,0 Q189,14 198,0 Q207,14 216,0 Q225,14 234,0 Q243,14 252,0 Q261,14 270,0 Q279,14 288,0 Q297,14 306,0 Q315,14 324,0 Q333,14 342,0 Q351,14 360,0 L360,0 L0,0 Z" fill="#fffef9"/>
    </svg>
  </div>

  <div class="hint">Enter to add &nbsp;·&nbsp; Backspace removes last &nbsp;·&nbsp; Click × to delete any</div>

  <script>
    const numbersEl = document.getElementById('numbers');
    const entryEl = document.getElementById('entry');
    const totalEl = document.getElementById('total');
    const deductionsEl = document.getElementById('deductions');
    const grandTotalEl = document.getElementById('grand-total');
    const addDeductionBtn = document.getElementById('add-deduction');

    let numbers = [];
    let deductions = [{ label: 'Till Float', amount: 0 }];

    function formatNumber(n) {
      return n.toFixed(2);
    }

    function getTotal() {
      return numbers.reduce((a, b) => a + b, 0);
    }

    function getDeductionTotal() {
      return deductions.reduce((a, d) => a + (d.amount || 0), 0);
    }

    function updateTotals() {
      const total = getTotal();
      const remaining = total - getDeductionTotal();
      totalEl.textContent = formatNumber(total);
      grandTotalEl.childNodes[0].textContent = formatNumber(remaining);
      grandTotalEl.classList.toggle('negative', remaining < 0);
    }

    function renderNumbers() {
      numbersEl.innerHTML = '';
      numbers.forEach((n, i) => {
        const row = document.createElement('div');
        row.className = 'number-row';

        const del = document.createElement('span');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.addEventListener('click', () => {
          numbers.splice(i, 1);
          renderNumbers();
          entryEl.focus();
        });

        const val = document.createElement('input');
        val.type = 'text';
        val.value = formatNumber(n);
        val.className = 'row-input';
        val.addEventListener('blur', () => {
          const raw = val.value.trim().replace(/,/g, '');
          const parsed = parseFloat(raw);
          if (raw !== '' && !isNaN(parsed)) {
            numbers[i] = parsed;
            val.value = formatNumber(parsed);
          } else {
            val.value = formatNumber(numbers[i]);
          }
          updateTotals();
        });
        val.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { val.blur(); entryEl.focus(); }
          else if (e.key === 'Escape') { val.value = formatNumber(numbers[i]); val.blur(); entryEl.focus(); }
        });

        row.appendChild(del);
        row.appendChild(val);
        numbersEl.appendChild(row);
      });
      updateTotals();
    }

    function renderDeductions() {
      deductionsEl.innerHTML = '';
      deductions.forEach((d, i) => {
        const row = document.createElement('div');
        row.className = 'deduction-row';

        const del = document.createElement('span');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.addEventListener('click', () => {
          deductions.splice(i, 1);
          renderDeductions();
        });

        const labelInput = document.createElement('input');
        labelInput.type = 'text';
        labelInput.className = 'deduction-label';
        labelInput.value = d.label;
        labelInput.placeholder = 'label';
        labelInput.addEventListener('blur', () => { deductions[i].label = labelInput.value; });
        labelInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === 'Tab') { amountInput.focus(); e.preventDefault(); }
        });

        const amountInput = document.createElement('input');
        amountInput.type = 'text';
        amountInput.className = 'deduction-amount';
        amountInput.value = d.amount !== null ? formatNumber(d.amount) : '';
        amountInput.placeholder = '0';
        amountInput.addEventListener('blur', () => {
          const raw = amountInput.value.trim().replace(/,/g, '');
          const parsed = parseFloat(raw);
          if (raw !== '' && !isNaN(parsed)) {
            deductions[i].amount = parsed;
            amountInput.value = formatNumber(parsed);
          } else if (raw === '') {
            deductions[i].amount = null;
          } else {
            amountInput.value = d.amount !== null ? formatNumber(d.amount) : '';
          }
          updateTotals();
        });
        amountInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { amountInput.blur(); entryEl.focus(); }
          else if (e.key === 'Escape') {
            amountInput.value = d.amount !== null ? formatNumber(d.amount) : '';
            amountInput.blur(); entryEl.focus();
          }
        });

        row.appendChild(del);
        row.appendChild(labelInput);
        row.appendChild(amountInput);
        deductionsEl.appendChild(row);
      });
      updateTotals();
    }

    addDeductionBtn.addEventListener('click', () => {
      deductions.push({ label: '', amount: null });
      renderDeductions();
      const rows = deductionsEl.querySelectorAll('.deduction-row');
      const lastLabel = rows[rows.length - 1].querySelector('.deduction-label');
      lastLabel.focus();
    });

    entryEl.addEventListener('input', () => {
      const raw = entryEl.value.trim().replace(/,/g, '');
      const n = parseFloat(raw);
      const pending = (!isNaN(n) && raw !== '') ? n : 0;
      const total = getTotal() + pending;
      const remaining = total - getDeductionTotal();
      totalEl.textContent = formatNumber(total);
      grandTotalEl.childNodes[0].textContent = formatNumber(remaining);
      grandTotalEl.classList.toggle('negative', remaining < 0);
    });

    entryEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const raw = entryEl.value.trim().replace(/,/g, '');
        const n = parseFloat(raw);
        if (raw !== '' && !isNaN(n)) {
          numbers.push(n);
          entryEl.value = '';
          renderNumbers();
        } else if (raw !== '') {
          entryEl.style.color = '#cc3333';
          setTimeout(() => { entryEl.style.color = '#1a6b3a'; }, 400);
        }
      } else if (e.key === 'Backspace' && entryEl.value === '' && numbers.length > 0) {
        numbers.pop();
        renderNumbers();
      }
    });

    document.addEventListener('click', (e) => {
      const ignore = ['delete-btn', 'row-input', 'deduction-amount', 'deduction-label'];
      if (!ignore.some(cls => e.target.classList.contains(cls)) && e.target !== addDeductionBtn) {
        entryEl.focus();
      }
    });

    renderNumbers();
    renderDeductions();

    document.getElementById('clear-btn').addEventListener('click', () => {
      numbers = [];
      deductions = [{ label: 'Till Float', amount: 0 }];
      entryEl.value = '';
      renderNumbers();
      renderDeductions();
      entryEl.focus();
    });

    const copyConfirmEl = document.getElementById('copy-confirm');
    grandTotalEl.addEventListener('click', () => {
      const value = grandTotalEl.childNodes[0].textContent.trim();
      grandTotalEl.classList.remove('copied');
      void grandTotalEl.offsetWidth;
      grandTotalEl.classList.add('copied');
      setTimeout(() => grandTotalEl.classList.remove('copied'), 350);
      navigator.clipboard.writeText(value).then(() => {
        copyConfirmEl.classList.add('show');
        setTimeout(() => copyConfirmEl.classList.remove('show'), 1500);
      });
    });
  </script>
</body>
</html>
