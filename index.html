<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CashBash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Mono", "Menlo", monospace;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 40px;
    }

    #app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    #numbers {
      display: flex;
      flex-direction: column;
    }

    .number-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 6px 12px;
      font-size: 22px;
      color: #1a1a1a;
      border-radius: 6px;
      transition: background 0.1s;
      position: relative;
    }

    .number-row:hover {
      background: #e8e8e2;
    }

    .number-row .delete-btn {
      position: absolute;
      left: -24px;
      opacity: 0;
      cursor: pointer;
      font-size: 14px;
      color: #cc3333;
      padding: 2px 6px;
      border-radius: 4px;
      transition: opacity 0.15s;
      user-select: none;
    }

    .number-row:hover .delete-btn {
      opacity: 1;
    }

    .row-input {
      background: transparent;
      border: none;
      outline: none;
      color: #1a1a1a;
      font-size: 22px;
      font-family: inherit;
      text-align: right;
      width: 100%;
      caret-color: #1a1a1a;
      cursor: default;
    }

    .row-input:focus {
      color: #1a6b3a;
      cursor: text;
      caret-color: #1a6b3a;
    }

    .input-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 6px 12px;
      border-radius: 6px;
    }

    #entry {
      background: transparent;
      border: none;
      outline: none;
      color: #1a6b3a;
      font-size: 22px;
      font-family: inherit;
      text-align: right;
      width: 100%;
      caret-color: #1a6b3a;
    }

    #entry::placeholder {
      color: #aaa;
    }

    .divider {
      height: 2px;
      background: #ccc;
      margin: 8px 12px;
      border-radius: 2px;
    }

    .divider.thin {
      height: 1px;
      background: #e0e0d8;
      margin: 4px 12px;
    }

    /* Total row */
    #total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 12px 4px;
    }

    #total-label {
      font-size: 13px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #total {
      font-size: 28px;
      font-weight: 600;
      color: #1a55a0;
    }

    /* Deductions section */
    #deductions {
      display: flex;
      flex-direction: column;
      margin-top: 4px;
    }

    .deduction-row {
      display: flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 6px;
      gap: 8px;
      position: relative;
    }

    .deduction-row:hover {
      background: #e8e8e2;
    }

    .deduction-row .delete-btn {
      position: absolute;
      left: -24px;
      opacity: 0;
      cursor: pointer;
      font-size: 14px;
      color: #cc3333;
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity 0.15s;
      user-select: none;
    }

    .deduction-row:hover .delete-btn {
      opacity: 1;
    }

    .deduction-label {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #777;
      font-size: 13px;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: default;
      min-width: 0;
    }

    .deduction-label:focus {
      color: #1a1a1a;
      cursor: text;
    }

    .deduction-amount {
      background: transparent;
      border: none;
      outline: none;
      color: #b03030;
      font-size: 22px;
      font-family: inherit;
      text-align: right;
      width: 160px;
      caret-color: #b03030;
      cursor: default;
    }

    .deduction-amount:focus {
      cursor: text;
    }

    /* Add deduction button */
    #add-deduction {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      cursor: pointer;
      color: #aaa;
      font-size: 13px;
      border-radius: 6px;
      transition: color 0.15s;
      user-select: none;
      width: fit-content;
      align-self: flex-start;
      margin-top: 2px;
    }

    #add-deduction:hover {
      color: #777;
    }

    /* Grand total */
    #grand-total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 12px 4px;
      margin-top: 4px;
    }

    #grand-total-label {
      font-size: 13px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #grand-total {
      font-size: 32px;
      font-weight: 700;
      color: #1a6b3a;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    #grand-total:hover {
      opacity: 0.75;
    }

    #copy-confirm {
      position: absolute;
      right: 0;
      top: -22px;
      font-size: 11px;
      color: #1a6b3a;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    #copy-confirm.show {
      opacity: 1;
    }

    #grand-total.negative {
      color: #cc3333;
    }

    @keyframes copy-flash {
      0%   { transform: scale(1); opacity: 1; }
      30%  { transform: scale(1.08); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    #grand-total.copied {
      animation: copy-flash 0.35s ease-out;
    }

    #branding {
      text-align: center;
      margin-bottom: 32px;
    }

    #branding h1 {
      font-family: "Pacifico", cursive;
      font-size: 36px;
      color: #1a55a0;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    #branding p {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .hint {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #bbb;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="branding">
    <h1>CashBash</h1>
    <p>Bash in the cash &amp; get yourself to the bank</p>
  </div>
  <div id="app">
    <div id="numbers"></div>
    <div class="input-row">
      <input id="entry" type="text" placeholder="type a number..." autocomplete="off" autofocus>
    </div>
    <div class="divider"></div>
    <div id="total-row">
      <span id="total-label">Total</span>
      <span id="total">0</span>
    </div>

    <div id="deductions"></div>
    <div id="add-deduction">+ add deduction</div>

    <div class="divider"></div>
    <div id="grand-total-row">
      <span id="grand-total-label">To Be Banked</span>
      <span id="grand-total">0<span id="copy-confirm">copied!</span></span>
    </div>
  </div>
  <div class="hint">Enter to add &nbsp;·&nbsp; Backspace on empty line removes last &nbsp;·&nbsp; Click × to delete any</div>

  <script>
    const numbersEl = document.getElementById('numbers');
    const entryEl = document.getElementById('entry');
    const totalEl = document.getElementById('total');
    const deductionsEl = document.getElementById('deductions');
    const grandTotalEl = document.getElementById('grand-total');
    const addDeductionBtn = document.getElementById('add-deduction');

    let numbers = [];
    // Each deduction: { label: string, amount: number|null }
    let deductions = [{ label: 'Till Float', amount: null }];

    function formatNumber(n) {
      return n.toFixed(2);
    }

    function getTotal() {
      return numbers.reduce((a, b) => a + b, 0);
    }

    function getDeductionTotal() {
      return deductions.reduce((a, d) => a + (d.amount || 0), 0);
    }

    function updateTotals() {
      const total = getTotal();
      const deductionTotal = getDeductionTotal();
      const remaining = total - deductionTotal;

      totalEl.textContent = formatNumber(total);
      grandTotalEl.textContent = formatNumber(remaining);
      grandTotalEl.classList.toggle('negative', remaining < 0);
    }

    function renderNumbers() {
      numbersEl.innerHTML = '';
      numbers.forEach((n, i) => {
        const row = document.createElement('div');
        row.className = 'number-row';

        const del = document.createElement('span');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.title = 'Remove';
        del.addEventListener('click', () => {
          numbers.splice(i, 1);
          renderNumbers();
          entryEl.focus();
        });

        const val = document.createElement('input');
        val.type = 'text';
        val.value = formatNumber(n);
        val.className = 'row-input';
        val.addEventListener('focus', () => row.style.background = '#ddeeff');
        val.addEventListener('blur', () => {
          row.style.background = '';
          const raw = val.value.trim().replace(/,/g, '');
          const parsed = parseFloat(raw);
          if (raw !== '' && !isNaN(parsed)) {
            numbers[i] = parsed;
            val.value = formatNumber(parsed);
          } else {
            val.value = formatNumber(numbers[i]);
          }
          updateTotals();
        });
        val.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { val.blur(); entryEl.focus(); }
          else if (e.key === 'Escape') { val.value = formatNumber(numbers[i]); val.blur(); entryEl.focus(); }
        });

        row.appendChild(del);
        row.appendChild(val);
        numbersEl.appendChild(row);
      });
      updateTotals();
    }

    function renderDeductions() {
      deductionsEl.innerHTML = '';
      deductions.forEach((d, i) => {
        const row = document.createElement('div');
        row.className = 'deduction-row';

        const del = document.createElement('span');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.addEventListener('click', () => {
          deductions.splice(i, 1);
          renderDeductions();
        });

        const labelInput = document.createElement('input');
        labelInput.type = 'text';
        labelInput.className = 'deduction-label';
        labelInput.value = d.label;
        labelInput.placeholder = 'label';
        labelInput.addEventListener('blur', () => { deductions[i].label = labelInput.value; });
        labelInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === 'Tab') { amountInput.focus(); e.preventDefault(); }
        });

        const amountInput = document.createElement('input');
        amountInput.type = 'text';
        amountInput.className = 'deduction-amount';
        amountInput.value = d.amount !== null ? formatNumber(d.amount) : '';
        amountInput.placeholder = '0';
        amountInput.addEventListener('focus', () => row.style.background = '#ddeeff');
        amountInput.addEventListener('blur', () => {
          row.style.background = '';
          const raw = amountInput.value.trim().replace(/,/g, '');
          const parsed = parseFloat(raw);
          if (raw !== '' && !isNaN(parsed)) {
            deductions[i].amount = parsed;
            amountInput.value = formatNumber(parsed);
          } else if (raw === '') {
            deductions[i].amount = null;
          } else {
            amountInput.value = d.amount !== null ? formatNumber(d.amount) : '';
          }
          updateTotals();
        });
        amountInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { amountInput.blur(); entryEl.focus(); }
          else if (e.key === 'Escape') {
            amountInput.value = d.amount !== null ? formatNumber(d.amount) : '';
            amountInput.blur(); entryEl.focus();
          }
        });

        row.appendChild(del);
        row.appendChild(labelInput);
        row.appendChild(amountInput);
        deductionsEl.appendChild(row);
      });
      updateTotals();
    }

    addDeductionBtn.addEventListener('click', () => {
      deductions.push({ label: '', amount: null });
      renderDeductions();
      // Focus the label of the new row
      const rows = deductionsEl.querySelectorAll('.deduction-row');
      const lastLabel = rows[rows.length - 1].querySelector('.deduction-label');
      lastLabel.focus();
    });

    entryEl.addEventListener('input', () => {
      const raw = entryEl.value.trim().replace(/,/g, '');
      const n = parseFloat(raw);
      const pending = (!isNaN(n) && raw !== '') ? n : 0;
      const total = getTotal() + pending;
      const remaining = total - getDeductionTotal();
      totalEl.textContent = formatNumber(total);
      grandTotalEl.textContent = formatNumber(remaining);
      grandTotalEl.classList.toggle('negative', remaining < 0);
    });

    entryEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const raw = entryEl.value.trim().replace(/,/g, '');
        const n = parseFloat(raw);
        if (raw !== '' && !isNaN(n)) {
          numbers.push(n);
          entryEl.value = '';
          renderNumbers();
        } else if (raw !== '') {
          entryEl.style.color = '#f38ba8';
          setTimeout(() => { entryEl.style.color = '#a6e3a1'; }, 400);
        }
      } else if (e.key === 'Backspace' && entryEl.value === '' && numbers.length > 0) {
        numbers.pop();
        renderNumbers();
      }
    });

    document.addEventListener('click', (e) => {
      const ignore = ['delete-btn', 'row-input', 'deduction-amount', 'deduction-label'];
      if (!ignore.some(cls => e.target.classList.contains(cls)) && e.target !== addDeductionBtn) {
        entryEl.focus();
      }
    });

    renderNumbers();
    renderDeductions();

    const copyConfirmEl = document.getElementById('copy-confirm');
    grandTotalEl.addEventListener('click', () => {
      const value = grandTotalEl.childNodes[0].textContent.trim();
      navigator.clipboard.writeText(value).then(() => {
        copyConfirmEl.classList.add('show');
        setTimeout(() => copyConfirmEl.classList.remove('show'), 1500);
        grandTotalEl.classList.add('copied');
        setTimeout(() => grandTotalEl.classList.remove('copied'), 350);
      });
    });
  </script>
</body>
</html>
